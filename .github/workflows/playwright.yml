name: Final Task Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test: 
    name: automation-exercise
    timeout-minutes: 25
    runs-on: ubuntu-latest
  
    strategy:
      fail-fast: false

      matrix:
        include:
        - project: automation-exercise
          browser: chromium
          web_url: https://automationexercise.com
          api_url: https://automationexercise.com/api

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Set up node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cach: npm
    - name: Install dependencies
      run: npm ci

    - name: Cache Playwright Browsers
      uses: actions/cache@v4
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

    - name: Install Playwright Browsers (cache miss)
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: npx playwright install --with-deps ${{ matrix.browser }} --workers=4
    
    - name: Install Playwright Browsers (cache hit)
      if: steps.playwright-cache.outputs.cache-hit == 'true'
      run: npx playwright install-deps ${{ matrix.browser }}

    - name: Run Playwright tests
      run: npx playwright test --project=${{ matrix.project }}
      env:
        WEB_URL: ${{ matrix.web_url }}
        API_URL: ${{ matrix.api_url }}

    - name: Upload Playwright HTML report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report-${{ matrix.project }}
        path: playwright-report/
        retention-days: 14

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: test-results-${{ matrix.project }}
        path: test-results/
        retention-days: 14
    
    - name: Generate Allure HTML report
      if: ${{ !cancelled() }}
      run: npx allure generate allure-results --clean -o allure-report

    - name: Upload Allure HTML report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: allure-report-${{ matrix.project }}
        path: allure-report/
        retention-days: 14
